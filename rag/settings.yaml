# LLM provider / model 配置. 服务启动时会按 provider 维度展开成
# LiteLLM Router 的 model_list (key × model 的笛卡尔积).
#
# - `provider`     LiteLLM 的 provider 前缀 (gemini / openai / anthropic / ...)
#                  完整列表见 https://docs.litellm.ai/docs/providers
# - `keys`         环境变量名列表; 同一 provider 下所有 model 共用这批 key.
#                  Router 会把同 model_name 下的多 key 各自当成独立 deployment,
#                  按 routing_strategy 在它们之间挑.
# - `api_base`     可选, 用于 OpenAI 兼容协议的自建/第三方端点.
# - `models`       该 provider 下要启用的模型. 每条可以是:
#                    "gemini-2.5-flash"                       —— 简写
#                    {name: gemini-2.5-flash, tpm: 4000000}   —— 带配额提示
#                                                               (仅 usage-based-routing 用)
#                  其中 name 不带 provider 前缀.
#                  调用方在 API 表单 `model` 字段传入的就是 name (会自动带上前缀).

default_model: gemini-2.5-flash

# 调度: simple-shuffle (随机轮转). 我们目前用 Google AI Studio free tier (各模型
# 真实 RPM 只有 5~30), 之前那套 tpm/rpm 数字纯是 SLO 占位, Router 拿它做
# usage-based-routing-v2 时算出来的"剩余 headroom"跟现实差几个数量级 — 真正
# 的限流来自 Google 那边的 429, 触发后由 cooldown_time 把这个 deployment 沉
# 默 60s, num_retries 自动换下一个 key 重试. 所以现在的实际行为是:
#   simple-shuffle 平均派单 + 撞 429 后冷却切换. 比假装会智能限流更诚实.
# 真上付费配额时再换回 usage-based-routing-v2 + 按真实 tpm/rpm 填模型条目.
router:
  routing_strategy: simple-shuffle
  num_retries: 2
  cooldown_time: 60

providers:
  - provider: gemini
    keys:
      - GEMINI_API_KEY_1
      - GEMINI_API_KEY_2
      - GEMINI_API_KEY_3
    models:
      - gemini-2.5-flash
      - gemini-2.5-pro
      - gemini-2.0-flash
      - gemini-2.0-flash-lite

  - provider: openai
    keys: [OPENAI_API_KEY]
    models:
      - gpt-4o
      - gpt-4o-mini

  - provider: anthropic
    keys: [ANTHROPIC_API_KEY]
    models:
      - claude-sonnet-4
      - claude-haiku-4

  # OpenAI 兼容协议示例 (阿里云 DashScope / Qwen):
  # - provider: openai
  #   api_base: https://dashscope.aliyuncs.com/compatible-mode/v1
  #   keys: [DASHSCOPE_API_KEY]
  #   models:
  #     - qwen-vl-max


# -----------------------------------------------------------------------------
# BTP AI Core 路径 (替代上面 providers 段, 用于 BTP 生产部署).
#
# 工作机制: 应用启动时 bapee.core.llm.try_build_aicore_router 会探测 VCAP_SERVICES
# 里有没有 `aicore` service binding. 有 + 这个 ai_core.deployments 列表非空 →
# 走 AI Core; 否则回 legacy `providers` 路径.
#
# 怎么填:
# 1. 在 SAP AI Launchpad 创 deployment, 拿 deployment_id (UUID).
#    或: `curl -H "Authorization: Bearer <token>" -H "AI-Resource-Group: default" \
#         <api_url>/v2/lm/deployments` 列已有的.
# 2. 把 deployment_id 写到下面对应 alias 的 deployment_id 字段.
# 3. `alias` 是业务代码里用的内部 model 名 — 跟 default_model / 路由 model
#    参数对齐. 想多个 alias 走同一 deployment_id 也行, 路由层按 alias 找.
# 4. `model` 是 deployment 底下实际挂的模型名 (e.g. `gpt-4o-mini`), 用于
#    LiteLLM 选 OpenAI parser, 不影响 AI Core 自己的路由.
#
# resource_group: AI-Resource-Group 头值. 默认用 AI Core 内置的 `default`;
# 自建 RG (e.g. 多项目隔离) 时改这个.
# -----------------------------------------------------------------------------
ai_core:
  resource_group: default
  deployments:
    # 把 deployment_id 填上后这条就会启用; 不填 (空字符串) → 启动直接报错,
    # 提示你"配置未填完". 不想启用某个 alias 整条注释掉就行.
    - alias: gemini-2.5-flash
      deployment_id: ""
      model: gemini-2.5-flash
    # - alias: gpt-4o-mini
    #   deployment_id: ""
    #   model: gpt-4o-mini
