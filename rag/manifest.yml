---
applications:
  - name: rag
    random-route: true
    routes:
      - route: rag.cfapps.eu10.hana.ondemand.com
    path: ..
    memory: 2G
    disk_quota: 3G
    buildpacks:
      - python_buildpack
    command: cd rag && gunicorn rag.main:app -c ../infra/logs.py

    # ---- Health check -----------------------------------------------------
    health-check-type: http
    health-check-http-endpoint: /readyz
    health-check-invocation-timeout: 5
    timeout: 180

    env:
      GUNICORN_TIMEOUT: 180          # SSE streaming can be slow
      GUNICORN_GRACEFUL_TIMEOUT: 25  # slightly less than BTP app-stop-timeout (30s)
      GUNICORN_KEEPALIVE: 75         # align with nginx/ALB
    services:
      - rb-bpae_application-log_lite_0
      # 凭证 / XSUAA / Redis 服务绑定（AI Core 已移除）:
      # - rag-bot-creds
      # - rag-xsuaa
      # - rag-redis
