---
applications:
  - name: analytics
    path: ..
    memory: 1G
    disk_quota: 1G
    buildpacks:
      - python_buildpack
    command: cd analytics && gunicorn analytics.main:app -c ../infra/logs.py -w 4 -b 0.0.0.0:$PORT

    health-check-type: http
    health-check-http-endpoint: /health
    health-check-invocation-timeout: 5
    timeout: 180

    env:
      ENV: production
