---
applications:
  - name: document
    path: ..
    memory: 2G
    disk_quota: 2G
    buildpacks:
      - python_buildpack
    command: cd document && gunicorn document.main:app -c ../infra/logs.py -w 4 -b 0.0.0.0:$PORT

    health-check-type: http
    health-check-http-endpoint: /healthz
    health-check-invocation-timeout: 5
    timeout: 180

    env:
      ENV: production
